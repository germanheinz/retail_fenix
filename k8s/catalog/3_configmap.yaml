#! IMPORTANT: Plain-text credentials here are for demo/study only. Use Secrets in production.
# ? ConfigMap stores non-sensitive config as key-value pairs injected as env vars via envFrom.
# ? NOTE The endpoint uses the StatefulSet Pod DNS format for the headless service:
# ? <pod-name>.<headless-svc-name>.<namespace>.svc.cluster.local:<port>
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog
data:
  RETAIL_CATALOG_PERSISTENCE_PROVIDER: "mysql"
  RETAIL_CATALOG_PERSISTENCE_ENDPOINT: "catalog-mysql:3306"
  # RETAIL_CATALOG_PERSISTENCE_ENDPOINT: "catalog-mysql-0.catalog-mysql.default.svc.cluster.local:3306"   
  RETAIL_CATALOG_PERSISTENCE_DB_NAME: "catalogdb"
  RETAIL_CATALOG_PERSISTENCE_USER: "catalog_user"
  RETAIL_CATALOG_PERSISTENCE_PASSWORD: "german123"
  RETAIL_CATALOG_PERSISTENCE_CONNECT_TIMEOUT: "5"