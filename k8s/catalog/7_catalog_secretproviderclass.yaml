apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: catalog-db-secrets
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "catalog-db-secret-1"
        objectType: "secretsmanager"
        jmesPath:
          - path: "MYSQL_USER"
            objectAlias: "MYSQL_USER"
          - path: "MYSQL_PASSWORD"
            objectAlias: "MYSQL_PASSWORD"
    usePodIdentity: "true"
  secretObjects:
    - secretName: catalog-db
      type: Opaque
      data:
        - objectName: "MYSQL_USER"
          key: RETAIL_CATALOG_PERSISTENCE_USER
        - objectName: "MYSQL_PASSWORD"
          key: RETAIL_CATALOG_PERSISTENCE_PASSWORD
