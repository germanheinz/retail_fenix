{{- if .Values.postgresql.create }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "retail-fenix.postgresql.fullname" . }}
  labels:
    {{- include "retail-fenix.postgresql.labels" . | nindent 4 }}
spec:
  type: {{ .Values.postgresql.service.type }}
  ports:
    - port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "retail-fenix.postgresql.selectorLabels" . | nindent 4 }}
{{- end }}
