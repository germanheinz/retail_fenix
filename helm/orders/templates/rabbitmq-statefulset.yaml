{{- if .Values.rabbitmq.create }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "retail-fenix.rabbitmq.fullname" . }}
  labels:
    {{- include "retail-fenix.rabbitmq.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "retail-fenix.rabbitmq.fullname" . }}
  selector:
    matchLabels:
      {{- include "retail-fenix.rabbitmq.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.rabbitmq.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "retail-fenix.rabbitmq.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: rabbitmq
          image: "{{ .Values.rabbitmq.image.repository }}:{{ .Values.rabbitmq.image.tag }}"
          imagePullPolicy: {{ .Values.rabbitmq.image.pullPolicy }}
          ports:
          - name: amqp
            containerPort: 5672
            protocol: TCP
          - name: http
            containerPort: 15672
            protocol: TCP
          volumeMounts:
          - name: data
            mountPath: "/var/lib/rabbitmq/mnesia"
      {{- with .Values.rabbitmq.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rabbitmq.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rabbitmq.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- if .Values.rabbitmq.persistentVolume.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- if .Values.rabbitmq.persistentVolume.annotations }}
        annotations:
{{ toYaml .Values.rabbitmq.persistentVolume.annotations | indent 10 }}
        {{- end }}
        {{- if .Values.rabbitmq.persistentVolume.labels }}
        labels:
{{ toYaml .Values.rabbitmq.persistentVolume.labels | indent 10 }}
        {{- end }}
      spec:
        accessModes:
{{ toYaml .Values.rabbitmq.persistentVolume.accessModes | indent 8 }}
        resources:
          requests:
            storage: "{{ .Values.rabbitmq.persistentVolume.size }}"
      {{- if .Values.rabbitmq.persistentVolume.storageClass }}
      {{- if (eq "-" .Values.rabbitmq.persistentVolume.storageClass) }}
        storageClassName: ""
      {{- else }}
        storageClassName: "{{ .Values.rabbitmq.persistentVolume.storageClass }}"
      {{- end }}
      {{- end }}
{{- else }}
      volumes:
      - name: data
        emptyDir: {}
{{- end }}
{{- end }}
