{{- if .Values.mysql.create }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "retail-fenix.mysql.fullname" . }}
  labels:
    {{- include "retail-fenix.mysql.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mysql.service.type }}
  ports:
    - port: {{ .Values.mysql.service.port }}
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    {{- include "retail-fenix.mysql.selectorLabels" . | nindent 4 }}
{{- end }}
